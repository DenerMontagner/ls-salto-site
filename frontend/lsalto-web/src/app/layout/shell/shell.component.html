<mat-sidenav-container class="sidenav-container">

  <mat-sidenav #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="sidenav">

    <div class="sidebar-header">
      <span class="logo-text">LS Salto</span>
    </div>

    <mat-nav-list>
      @for (item of visibleItems(); track item.route) {
        <a mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          (click)="isMobile() && sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidebar-footer">
      <span class="role-badge" [class.anciao]="isAnciao()">
        {{ isAnciao() ? 'Ancião' : 'Publicador' }}
      </span>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" matTooltip="Menu">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-title">LS Salto</span>
      <span class="spacer"></span>

      <button mat-icon-button (click)="toggleTheme()" [matTooltip]="isDark() ? 'Modo claro' : 'Modo escuro'">
        <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="Minha conta">
        <mat-icon>account_circle</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <div class="user-menu-header">
          <mat-icon>person</mat-icon>
          <span>{{ nome() }}</span>
        </div>
        <mat-divider />
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sair</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
