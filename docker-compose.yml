services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lsalto-sqlserver
    environment:
      SA_PASSWORD: "LSalto@2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - lsalto-sqldata:/var/opt/mssql
    networks:
      - lsalto-network

volumes:
  lsalto-sqldata:

networks:
  lsalto-network:
    driver: bridge
